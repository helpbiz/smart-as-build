version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: smartas-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    networks:
      - smart-as-net
    restart: unless-stopped

  backend:
    image: smartas-backend:latest
    container_name: smartas-backend
    environment:
      - DB_HOST=as-system-db
      - DB_PORT=5432
      - DB_USER=smartas
      - DB_PASSWORD=smartas1234
      - DB_NAME=smart_as
      - JWT_SECRET=smartas-jwt-secret-key-32chars-minimum
      - SERVER_PORT=8088
    networks:
      - smart-as-net
    restart: unless-stopped

  frontend:
    image: smartas-frontend:latest
    container_name: smartas-frontend
    networks:
      - smart-as-net
    restart: unless-stopped

networks:
  smart-as-net:
    external: true
