# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name foryouelec.co.kr www.foryouelec.co.kr _;

    # Let's Encrypt 인증서 발급용 (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://foryouelec.co.kr$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name foryouelec.co.kr www.foryouelec.co.kr;

    ssl_certificate     /etc/nginx/certs/live/foryouelec.co.kr/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/foryouelec.co.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://smartas-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://smartas-backend:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location /uploads/ {
        proxy_pass http://smartas-backend:8088/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
